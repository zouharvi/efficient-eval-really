Method = "Simulation-based power analysis: samples evaluation outcomes from a data-generating process, applies a statistical test across iterations, and estimates power as the proportion of simulations that reject the null hypothesis. Provides pre-hoc power curves and MDE curves, plus post-hoc analysis of existing benchmarks. Demonstrated on classification tasks but method is general and supports win rates and human preference scores."
